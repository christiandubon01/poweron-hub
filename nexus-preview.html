<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXUS Chat Panel — Preview</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <style>
    /* PowerOn Hub design tokens */
    :root {
      --bg: #060608; --bg-1: #0C0C10; --bg-2: #111116; --bg-3: #18181F; --bg-4: #22222C; --bg-5: #2E2E3A;
      --text-1: #F0F0FF; --text-2: #A8A8C0; --text-3: #60607A; --text-4: #30303F;
      --green: #2EE89A; --green-subtle: rgba(46,232,154,0.10); --green-border: rgba(46,232,154,0.25);
      --gold: #FFD24A; --gold-subtle: rgba(255,210,74,0.10);
      --blue: #3A8EFF; --red: #FF5060; --orange: #FF9040; --purple: #AA6EFF;
      --teal: #40D4FF; --lime: #A8FF3E; --spark: #FF5FA0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Syne', system-ui, sans-serif; background: var(--bg); color: var(--text-1); }
    .mono { font-family: 'IBM Plex Mono', monospace; }

    /* Layout */
    .app { display: flex; height: 100vh; overflow: hidden; }
    .sidebar { width: 220px; flex-shrink: 0; background: var(--bg-1); border-right: 1px solid var(--bg-4); display: flex; flex-direction: column; }
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    /* Sidebar */
    .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 16px 20px; border-bottom: 1px solid var(--bg-4); }
    .logo-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--green-subtle); border: 1px solid var(--green-border); display: flex; align-items: center; justify-content: center; color: var(--green); font-size: 14px; }
    .logo-text { font-size: 12px; font-weight: 700; color: var(--text-1); }
    .logo-ver { font-size: 10px; color: var(--text-3); }

    .nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 12px; cursor: pointer; font-size: 12px; font-weight: 600; color: var(--text-3); transition: all 0.15s; width: 100%; border: none; background: none; text-align: left; }
    .nav-item:hover { background: var(--bg-3); color: var(--text-2); }
    .nav-item.active { background: rgba(46,232,154,0.1); color: var(--text-1); }
    .nav-item.disabled { color: var(--text-4); cursor: not-allowed; }
    .nav-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .nav-badge { font-size: 9px; padding: 2px 4px; border-radius: 4px; background: var(--bg-4); color: var(--text-4); }
    .agent-label { font-size: 10px; color: var(--green); margin-left: auto; }

    /* Chat panel */
    .chat-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid var(--bg-4); background: rgba(12,12,16,0.8); }
    .chat-header-left { display: flex; align-items: center; gap: 12px; }
    .online-badge { display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; background: var(--green-subtle); border: 1px solid var(--green-border); }
    .online-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
    .online-text { font-size: 10px; font-weight: 700; color: var(--green); }

    /* Messages area */
    .messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 16px; }

    /* Welcome state */
    .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 48px 0; }
    .welcome-icon { width: 64px; height: 64px; border-radius: 16px; background: var(--green-subtle); border: 1px solid var(--green-border); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; font-size: 32px; color: var(--green); }
    .welcome h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .welcome p { font-size: 14px; color: var(--text-3); max-width: 400px; }
    .suggestions { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 24px; }
    .suggestion { padding: 6px 12px; border-radius: 8px; background: var(--bg-2); border: 1px solid var(--bg-4); font-size: 12px; color: var(--text-2); cursor: pointer; transition: all 0.15s; }
    .suggestion:hover { background: var(--bg-3); color: var(--text-1); }

    /* Message bubbles */
    .msg { display: flex; gap: 12px; animation: fadeIn 0.2s ease-out; }
    .msg.user { flex-direction: row-reverse; }
    .msg-avatar { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 4px; font-size: 9px; font-weight: 700; }
    .msg-bubble { max-width: 80%; border-radius: 16px; padding: 12px 16px; }
    .msg.user .msg-bubble { background: var(--bg-3); border: 1px solid var(--bg-5); }
    .msg.assistant .msg-bubble { background: var(--bg-2); border: 1px solid var(--bg-4); }

    /* Agent badge */
    .agent-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .badge-nexus { background: var(--green-subtle); border: 1px solid var(--green-border); color: var(--green); }
    .badge-vault { background: var(--gold-subtle); border: 1px solid rgba(255,210,74,0.25); color: var(--gold); }
    .badge-pulse { background: rgba(58,142,255,0.10); border: 1px solid rgba(58,142,255,0.25); color: var(--blue); }
    .badge-ledger { background: rgba(64,212,255,0.10); border: 1px solid rgba(64,212,255,0.25); color: var(--teal); }
    .badge-spark { background: rgba(255,95,160,0.10); border: 1px solid rgba(255,95,160,0.25); color: var(--spark); }
    .badge-blueprint { background: rgba(170,110,255,0.10); border: 1px solid rgba(170,110,255,0.25); color: var(--purple); }
    .badge-ohm { background: rgba(168,255,62,0.10); border: 1px solid rgba(168,255,62,0.25); color: var(--lime); }
    .badge-chrono { background: rgba(255,144,64,0.10); border: 1px solid rgba(255,144,64,0.25); color: var(--orange); }
    .badge-scout { background: rgba(255,80,96,0.10); border: 1px solid rgba(255,80,96,0.25); color: var(--red); }

    .impact-label { font-size: 9px; font-weight: 700; text-transform: uppercase; }
    .impact-medium { color: var(--gold); }
    .impact-high { color: var(--orange); }
    .impact-critical { color: var(--red); }

    .msg-content { font-size: 14px; color: var(--text-2); line-height: 1.6; white-space: pre-wrap; }
    .msg-time { font-size: 10px; color: var(--text-4); margin-top: 6px; opacity: 0; transition: opacity 0.15s; }
    .msg:hover .msg-time { opacity: 1; }

    /* Proposal card */
    .proposal { margin: 0 20px 12px; border-radius: 12px; padding: 16px; animation: slideUp 0.3s ease-out; }
    .proposal.high { background: rgba(255,144,64,0.08); border: 1px solid rgba(255,144,64,0.25); }
    .proposal.critical { background: rgba(255,80,96,0.08); border: 1px solid rgba(255,80,96,0.25); }
    .proposal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .proposal-title { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    .proposal-desc { font-size: 14px; color: var(--text-2); margin-bottom: 12px; line-height: 1.6; }
    .proposal-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .meta-tag { padding: 2px 8px; border-radius: 4px; background: var(--bg-3); font-size: 10px; color: var(--text-3); }
    .proposal-actions { display: flex; gap: 8px; }
    .btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.15s; border: none; }
    .btn-confirm { background: var(--green); color: var(--bg); }
    .btn-confirm:hover { filter: brightness(1.1); }
    .btn-cancel { background: var(--bg-3); border: 1px solid var(--bg-5); color: var(--text-2); }
    .btn-cancel:hover { background: var(--bg-4); }

    /* Input */
    .input-area { padding: 8px 20px 20px; }
    .input-wrap { display: flex; align-items: flex-end; gap: 8px; background: var(--bg-2); border: 1px solid var(--bg-4); border-radius: 12px; padding: 12px 16px; transition: border-color 0.15s; }
    .input-wrap:focus-within { border-color: var(--green-border); }
    .input-wrap textarea { flex: 1; background: transparent; border: none; outline: none; color: var(--text-1); font-size: 14px; resize: none; font-family: inherit; min-height: 20px; max-height: 128px; }
    .input-wrap textarea::placeholder { color: var(--text-4); }
    .send-btn { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; flex-shrink: 0; transition: all 0.15s; }
    .send-btn.active { background: var(--green); color: var(--bg); }
    .send-btn.inactive { background: var(--bg-4); color: var(--text-4); cursor: not-allowed; }
    .routing-text { text-align: center; margin-top: 8px; font-size: 10px; color: var(--text-4); }

    /* Loading dots */
    .loading-dots { display: flex; align-items: center; gap: 6px; padding: 4px 0; }
    .loading-dots span { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 1s infinite; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const e = React.createElement;

    // ── Mock data for preview ──────────────────────────────────────────────────
    const MOCK_MESSAGES = [
      { id: '1', role: 'user', content: 'Show me all overdue invoices', timestamp: Date.now() - 60000 },
      {
        id: '2', role: 'assistant', content: 'You have 3 overdue invoices totaling $12,450:\n\n1. INV-2024-087 — Martinez Residence — $4,200 (15 days overdue)\n2. INV-2024-091 — GreenTech Office TI — $6,750 (8 days overdue)\n3. INV-2024-094 — Panel Upgrade (Elm St) — $1,500 (3 days overdue)\n\nWould you like me to send overdue reminders?',
        timestamp: Date.now() - 55000, agentId: 'ledger', impactLevel: 'LOW'
      },
      { id: '3', role: 'user', content: 'Yes, send reminders for all three', timestamp: Date.now() - 40000 },
      {
        id: '4', role: 'assistant', content: '⚡ This action requires your confirmation (HIGH impact). Review the proposal below.',
        timestamp: Date.now() - 38000, agentId: 'ledger', impactLevel: 'HIGH'
      },
    ];

    const AGENTS = {
      nexus: { name: 'NEXUS', badge: 'badge-nexus' },
      vault: { name: 'VAULT', badge: 'badge-vault' },
      pulse: { name: 'PULSE', badge: 'badge-pulse' },
      ledger: { name: 'LEDGER', badge: 'badge-ledger' },
      spark: { name: 'SPARK', badge: 'badge-spark' },
      blueprint: { name: 'BLUEPRINT', badge: 'badge-blueprint' },
      ohm: { name: 'OHM', badge: 'badge-ohm' },
      chrono: { name: 'CHRONO', badge: 'badge-chrono' },
      scout: { name: 'SCOUT', badge: 'badge-scout' },
    };

    // ── AgentBadge ────────────────────────────────────────────────────────────
    function AgentBadge({ agentId }) {
      const agent = AGENTS[agentId] || AGENTS.nexus;
      return e('span', { className: `agent-badge ${agent.badge} mono` }, `via ${agent.name}`);
    }

    // ── MessageBubble ─────────────────────────────────────────────────────────
    function MessageBubble({ role, content, timestamp, agentId, impactLevel, isLoading }) {
      const isUser = role === 'user';
      const agent = AGENTS[agentId] || AGENTS.nexus;
      const time = new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      return e('div', { className: `msg ${role}` },
        !isUser && e('div', {
          className: 'msg-avatar',
          style: { background: 'var(--green-subtle)', border: '1px solid var(--green-border)', color: 'var(--green)' }
        }, e('span', { className: 'mono' }, agent.name.charAt(0))),
        e('div', { className: 'msg-bubble' },
          !isUser && e('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '6px' } },
            e(AgentBadge, { agentId: agentId || 'nexus' }),
            impactLevel && impactLevel !== 'LOW' && e('span', {
              className: `impact-label impact-${impactLevel.toLowerCase()} mono`
            }, impactLevel)
          ),
          isLoading
            ? e('div', { className: 'loading-dots' }, e('span'), e('span'), e('span'))
            : e('div', { className: 'msg-content' }, content),
          e('div', { className: `msg-time mono`, style: { textAlign: isUser ? 'right' : 'left' } }, time)
        )
      );
    }

    // ── ProposalCard ──────────────────────────────────────────────────────────
    function ProposalCard({ onConfirm, onCancel }) {
      return e('div', { className: 'proposal high' },
        e('div', { className: 'proposal-header' },
          e('div', { className: 'proposal-title', style: { color: 'var(--orange)' } },
            '⚠ ', 'HIGH Impact Action'
          ),
          e(AgentBadge, { agentId: 'ledger' })
        ),
        e('div', { className: 'proposal-desc' },
          'Send overdue payment reminders to 3 clients: Martinez Residence ($4,200), GreenTech Office TI ($6,750), and Panel Upgrade - Elm St ($1,500).'
        ),
        e('div', { className: 'proposal-meta' },
          e('span', { className: 'meta-tag mono' }, 'finance'),
          e('span', { className: 'meta-tag mono' }, 'confidence: 94%'),
          e('span', { className: 'meta-tag mono' }, 'invoice: 3 targets')
        ),
        e('div', { className: 'proposal-actions' },
          e('button', { className: 'btn btn-confirm', onClick: onConfirm }, '✓ Confirm'),
          e('button', { className: 'btn btn-cancel', onClick: onCancel }, '✕ Cancel')
        )
      );
    }

    // ── NexusChatPanel ────────────────────────────────────────────────────────
    function NexusChatPanel() {
      const [messages, setMessages] = React.useState([]);
      const [input, setInput] = React.useState('');
      const [showProposal, setShowProposal] = React.useState(false);
      const [view, setView] = React.useState('welcome'); // 'welcome' | 'chat'

      function loadDemo() {
        setMessages(MOCK_MESSAGES);
        setShowProposal(true);
        setView('chat');
      }

      function handleSuggestion(text) {
        setInput(text);
      }

      return e('div', { style: { display: 'flex', flexDirection: 'column', height: '100%', background: 'var(--bg)' } },
        // Header
        e('div', { className: 'chat-header' },
          e('div', { className: 'chat-header-left' },
            e('div', { className: 'logo-icon' }, '⚡'),
            e('div', null,
              e('div', { style: { fontSize: '14px', fontWeight: 700, color: 'var(--text-1)' } }, 'NEXUS'),
              e('div', { className: 'mono', style: { fontSize: '10px', color: 'var(--text-3)' } }, 'Manager Agent')
            )
          ),
          e('div', { className: 'online-badge' },
            e('span', { className: 'online-dot' }),
            e('span', { className: 'online-text mono' }, 'ONLINE')
          )
        ),

        // Messages
        e('div', { className: 'messages' },
          view === 'welcome'
            ? e('div', { className: 'welcome' },
                e('div', { className: 'welcome-icon' }, '⚡'),
                e('h3', null, 'Hey, Christian!'),
                e('p', null, "I'm NEXUS, your operations manager. Ask me anything about your projects, invoices, estimates, scheduling, or anything else — I'll route it to the right agent."),
                e('div', { className: 'suggestions' },
                  ['Show me overdue invoices', 'What projects are in progress?', 'Revenue this week', 'Open coordination items'].map(s =>
                    e('button', { key: s, className: 'suggestion', onClick: () => handleSuggestion(s) }, s)
                  )
                ),
                e('button', {
                  className: 'btn btn-confirm', style: { marginTop: '24px' },
                  onClick: loadDemo
                }, 'Load Demo Conversation')
              )
            : messages.map(m =>
                e(MessageBubble, {
                  key: m.id, role: m.role, content: m.content,
                  timestamp: m.timestamp, agentId: m.agentId, impactLevel: m.impactLevel
                })
              )
        ),

        // Proposal card
        showProposal && e(ProposalCard, {
          onConfirm: () => {
            setShowProposal(false);
            setMessages(prev => [...prev, {
              id: '5', role: 'assistant',
              content: 'Done! Sent overdue reminders to all 3 clients:\n✓ Martinez Residence — reminder sent to maria@martinez.email\n✓ GreenTech Office TI — reminder sent to ap@greentech.com\n✓ Panel Upgrade (Elm St) — reminder sent to john.elm@gmail.com\n\nI\'ll flag you if any remain unpaid after 7 days.',
              timestamp: Date.now(), agentId: 'ledger', impactLevel: 'MEDIUM'
            }]);
          },
          onCancel: () => {
            setShowProposal(false);
            setMessages(prev => [...prev, {
              id: '5', role: 'assistant', content: 'Action cancelled. Let me know if you need anything else.',
              timestamp: Date.now(), agentId: 'nexus'
            }]);
          }
        }),

        // Input
        e('div', { className: 'input-area' },
          e('div', { className: 'input-wrap' },
            e('textarea', {
              value: input, onChange: (ev) => setInput(ev.target.value),
              placeholder: 'Ask NEXUS anything...', rows: 1,
              onKeyDown: (ev) => {
                if (ev.key === 'Enter' && !ev.shiftKey) {
                  ev.preventDefault();
                  if (input.trim()) {
                    setMessages(prev => [...prev, { id: crypto.randomUUID(), role: 'user', content: input, timestamp: Date.now() }]);
                    setInput('');
                    setView('chat');
                  }
                }
              }
            }),
            e('button', { className: `send-btn ${input.trim() ? 'active' : 'inactive'}` }, '→')
          ),
          e('div', { className: 'routing-text mono' }, 'NEXUS routes to VAULT · PULSE · LEDGER · SPARK · BLUEPRINT · OHM · CHRONO · SCOUT')
        )
      );
    }

    // ── Sidebar ───────────────────────────────────────────────────────────────
    function Sidebar({ activeNav, onNav }) {
      const navItems = [
        { id: 'nexus', label: 'NEXUS Chat', agent: 'NEXUS', color: 'var(--green)', enabled: true },
        { id: 'dashboard', label: 'Dashboard', agent: 'PULSE', color: 'var(--blue)', enabled: true },
        { id: 'projects', label: 'Projects', agent: 'BLUEPRINT', color: 'var(--purple)', enabled: false, phase: 2 },
        { id: 'estimates', label: 'Estimates', agent: 'VAULT', color: 'var(--gold)', enabled: false, phase: 2 },
        { id: 'invoices', label: 'Invoices', agent: 'LEDGER', color: 'var(--teal)', enabled: false, phase: 2 },
        { id: 'marketing', label: 'Marketing', agent: 'SPARK', color: 'var(--spark)', enabled: false, phase: 3 },
        { id: 'calendar', label: 'Calendar', agent: 'CHRONO', color: 'var(--orange)', enabled: false, phase: 2 },
        { id: 'compliance', label: 'Compliance', agent: 'OHM', color: 'var(--lime)', enabled: false, phase: 3 },
        { id: 'scout', label: 'Scout', agent: 'SCOUT', color: 'var(--red)', enabled: false, phase: 2 },
      ];

      return e('aside', { className: 'sidebar' },
        e('div', { className: 'sidebar-logo' },
          e('div', { className: 'logo-icon' }, '⚡'),
          e('div', null,
            e('div', { className: 'logo-text' }, 'PowerOn Hub'),
            e('div', { className: 'logo-ver mono' }, 'v2.0')
          )
        ),
        e('nav', { className: 'nav' },
          navItems.map(item =>
            e('button', {
              key: item.id,
              className: `nav-item ${activeNav === item.id ? 'active' : ''} ${!item.enabled ? 'disabled' : ''}`,
              onClick: () => item.enabled && onNav(item.id)
            },
              e('span', { className: 'nav-dot', style: { background: item.color } }),
              e('span', null, item.label),
              activeNav === item.id && e('span', { className: 'agent-label mono' }, item.agent),
              !item.enabled && e('span', { className: 'nav-badge mono' }, `P${item.phase}`)
            )
          )
        )
      );
    }

    // ── App ───────────────────────────────────────────────────────────────────
    function App() {
      const [activeNav, setActiveNav] = React.useState('nexus');

      return e('div', { className: 'app' },
        e(Sidebar, { activeNav, onNav: setActiveNav }),
        e('div', { className: 'main' },
          activeNav === 'nexus'
            ? e(NexusChatPanel)
            : e('div', { style: { padding: '24px', color: 'var(--text-3)', fontSize: '14px' } }, `${activeNav} view — coming in Phase 02+`)
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(e(App));
  </script>
</body>
</html>
