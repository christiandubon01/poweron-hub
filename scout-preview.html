<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCOUT ProposalFeed — Preview</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <style>
    :root {
      --bg: #060608; --bg-1: #0C0C10; --bg-2: #111116; --bg-3: #18181F; --bg-4: #22222C; --bg-5: #2E2E3A;
      --text-1: #F0F0FF; --text-2: #A8A8C0; --text-3: #60607A; --text-4: #30303F;
      --green: #2EE89A; --green-subtle: rgba(46,232,154,0.10); --green-border: rgba(46,232,154,0.25);
      --gold: #FFD24A; --gold-subtle: rgba(255,210,74,0.10);
      --blue: #3A8EFF; --blue-subtle: rgba(58,142,255,0.12);
      --red: #FF5060; --red-subtle: rgba(255,80,96,0.10);
      --orange: #FF9040; --purple: #AA6EFF;
      --teal: #40D4FF; --lime: #A8FF3E; --spark: #FF5FA0; --scout: #FF5060;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Syne', system-ui, sans-serif; background: var(--bg); color: var(--text-1); }
    .mono { font-family: 'IBM Plex Mono', monospace; }
    .app { display: flex; height: 100vh; overflow: hidden; }
    .sidebar { width: 220px; flex-shrink: 0; background: var(--bg-1); border-right: 1px solid var(--bg-4); display: flex; flex-direction: column; }
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 16px 20px; border-bottom: 1px solid var(--bg-4); }
    .logo-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--green-subtle); border: 1px solid var(--green-border); display: flex; align-items: center; justify-content: center; color: var(--green); font-size: 14px; }
    .nav { flex: 1; padding: 16px 12px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 12px; cursor: pointer; font-size: 12px; font-weight: 600; color: var(--text-3); border: none; background: none; width: 100%; text-align: left; }
    .nav-item.active { background: rgba(255,80,96,0.1); color: var(--text-1); }
    .nav-item.disabled { color: var(--text-4); cursor: not-allowed; }
    .nav-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .agent-label { font-size: 10px; color: var(--scout); margin-left: auto; }
    .nav-badge { font-size: 9px; padding: 2px 4px; border-radius: 4px; background: var(--bg-4); color: var(--text-4); }
    .feed-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid var(--bg-4); background: rgba(12,12,16,0.8); }
    .feed-header-left { display: flex; align-items: center; gap: 12px; }
    .scout-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--red-subtle); border: 1px solid rgba(255,80,96,0.25); display: flex; align-items: center; justify-content: center; color: var(--scout); font-size: 14px; }
    .run-btn { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; border: 1px solid rgba(255,80,96,0.25); background: rgba(255,80,96,0.1); color: var(--scout); cursor: pointer; }
    .run-btn:hover { background: rgba(255,80,96,0.2); }
    .cards { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
    .card { border-radius: 12px; padding: 16px; border: 1px solid var(--bg-4); background: var(--bg-2); }
    .card.high-impact { background: rgba(58,142,255,0.06); border-color: rgba(58,142,255,0.20); }
    .card.high-risk { background: var(--red-subtle); border-color: rgba(255,80,96,0.20); }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
    .cat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    .agent-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 700; text-transform: uppercase; background: var(--red-subtle); border: 1px solid rgba(255,80,96,0.25); color: var(--scout); }
    .time-label { font-size: 10px; color: var(--text-4); }
    .card-title { font-size: 14px; font-weight: 700; color: var(--text-1); line-height: 1.4; }
    .card-desc { font-size: 12px; color: var(--text-2); line-height: 1.6; margin-bottom: 12px; }
    .score-pills { display: flex; gap: 4px; flex-shrink: 0; }
    .pill { display: flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 8px; font-size: 10px; font-weight: 700; }
    .pill.impact { background: var(--blue-subtle); color: var(--blue); }
    .pill.risk { background: var(--red-subtle); color: var(--red); }
    .pill.neutral { background: var(--bg-3); color: var(--text-3); }
    .score-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .score-label { font-size: 10px; color: var(--text-3); width: 48px; flex-shrink: 0; }
    .bar-track { flex: 1; height: 6px; background: var(--bg-4); border-radius: 999px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 999px; transition: width 0.5s; }
    .bar-fill.blue { background: var(--blue); }
    .bar-fill.red { background: var(--red); }
    .bar-fill.dim { background: var(--bg-5); }
    .bar-value { font-size: 10px; font-weight: 700; color: var(--text-2); width: 24px; text-align: right; }
    .mirofish { font-size: 9px; color: var(--text-4); background: var(--bg-3); padding: 2px 6px; border-radius: 4px; margin: 12px 0; display: inline-block; }
    .actions { display: flex; gap: 8px; }
    .btn { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; }
    .btn-confirm { background: var(--green); color: #060608; }
    .btn-skip { background: var(--bg-3); border: 1px solid var(--bg-5); color: var(--text-3); }
    .btn-details { background: var(--bg-3); border: 1px solid var(--bg-5); color: var(--text-3); margin-left: auto; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade-in { animation: fadeIn 0.2s ease-out; }
    .run-summary { margin: 12px 20px 0; padding: 10px 16px; border-radius: 8px; background: var(--bg-2); border: 1px solid var(--bg-4); font-size: 10px; color: var(--text-3); }
  </style>
</head>
<body>
<div id="root"></div>
<script>
const e = React.createElement;

const MOCK_PROPOSALS = [
  {
    id: '1', title: 'Update 23 wire prices in price book — avg 12% increase since last update',
    description: 'Price book has 23 wire items not updated in 90+ days. Copper wire prices have risen ~12% since last refresh. Current estimates using stale pricing risk margin erosion on new bids.',
    category: 'pricing', impact_score: 0.8, risk_score: 0.7, proposing_agent: 'scout',
    mirofish_step: 5, status: 'proposed', created_at: new Date(Date.now() - 3600000).toISOString(),
    source_data: { items_affected: 23, avg_price_drift: '12%', oldest_update: '2025-12-15' }
  },
  {
    id: '2', title: 'Follow up with 4 dormant GC contacts — $180K pipeline at risk',
    description: 'Four GC contacts with fit_score > 7 have had no activity in 90+ days: Summit Construction (120d), Pacific Builders (105d), CoreTech Development (92d), Meridian Interiors (91d). Combined historical bid volume: $180K.',
    category: 'relationship', impact_score: 0.7, risk_score: 0.6, proposing_agent: 'scout',
    mirofish_step: 5, status: 'proposed', created_at: new Date(Date.now() - 7200000).toISOString(),
    source_data: { gc_count: 4, pipeline_value: 180000 }
  },
  {
    id: '3', title: 'Martinez Residence project 18% over labor estimate — review scope',
    description: 'Field logs show 142 labor hours vs 120 estimated (18% over). Material costs tracking at $8,200 vs $7,500 estimate (9% over). Project is in "in_progress" phase with coordination items on track.',
    category: 'financial', impact_score: 0.9, risk_score: 0.8, proposing_agent: 'scout',
    mirofish_step: 5, status: 'proposed', created_at: new Date(Date.now() - 1800000).toISOString(),
    source_data: { project_id: 'abc-123', actual_hours: 142, estimated_hours: 120, variance_pct: 18.3 }
  },
  {
    id: '4', title: '5 overdue coordination items across 3 projects — permit delays',
    description: 'Five coordination items are past their due date: 2 permits (avg 8 days late), 2 inspections (avg 4 days late), 1 urgent item (3 days late). Affects: GreenTech TI, Elm St Panel Upgrade, Solar Install #47.',
    category: 'compliance', impact_score: 0.8, risk_score: 0.9, proposing_agent: 'scout',
    mirofish_step: 5, status: 'proposed', created_at: new Date(Date.now() - 900000).toISOString(),
    source_data: { items_overdue: 5, projects_affected: 3 }
  }
];

function ScoreBar({ label, value, max, color }) {
  max = max || 10;
  const pct = Math.min((value / max) * 100, 100);
  return e('div', { className: 'score-bar' },
    e('span', { className: 'score-label mono' }, label),
    e('div', { className: 'bar-track' },
      e('div', { className: `bar-fill ${color}`, style: { width: pct + '%' } })
    ),
    e('span', { className: 'bar-value mono' }, value)
  );
}

function ProposalCard({ proposal, onConfirm, onSkip, onDetails }) {
  const impact = Math.round(proposal.impact_score * 10);
  const risk = Math.round(proposal.risk_score * 10);
  const catColors = { pricing: 'var(--gold)', relationship: 'var(--spark)', financial: 'var(--gold)',
    compliance: 'var(--lime)', operations: 'var(--blue)', scheduling: 'var(--orange)', staffing: 'var(--purple)' };
  const cls = risk >= 8 ? 'card high-risk' : impact >= 8 ? 'card high-impact' : 'card';

  return e('div', { className: cls + ' animate-fade-in' },
    e('div', { className: 'card-header' },
      e('div', { style: { flex: 1, minWidth: 0 } },
        e('div', { className: 'card-meta' },
          e('span', { className: 'cat-label mono', style: { color: catColors[proposal.category] || 'var(--text-3)' } }, proposal.category),
          e('span', { className: 'agent-badge mono' }, 'via SCOUT'),
          e('span', { className: 'time-label mono' }, getTimeAgo(proposal.created_at))
        ),
        e('div', { className: 'card-title' }, proposal.title)
      ),
      e('div', { className: 'score-pills' },
        e('div', { className: 'pill ' + (impact >= 8 ? 'impact' : 'neutral') }, '↑ ' + impact),
        e('div', { className: 'pill ' + (risk >= 8 ? 'risk' : 'neutral') }, '⚠ ' + risk)
      )
    ),
    e('div', { className: 'card-desc' }, proposal.description),
    e(ScoreBar, { label: 'Impact', value: impact, color: impact >= 8 ? 'blue' : impact >= 5 ? 'blue' : 'dim' }),
    e(ScoreBar, { label: 'Risk', value: risk, color: risk >= 8 ? 'red' : risk >= 5 ? 'red' : 'dim' }),
    e('div', { className: 'mirofish mono' }, 'MiroFish ' + proposal.mirofish_step + '/5 ✓'),
    e('div', { className: 'actions' },
      e('button', { className: 'btn btn-confirm', onClick: () => onConfirm(proposal.id) }, '✓ Confirm'),
      e('button', { className: 'btn btn-skip', onClick: () => onSkip(proposal.id) }, '⏭ Skip'),
      e('button', { className: 'btn btn-details', onClick: () => onDetails(proposal.id) }, '👁 Details')
    )
  );
}

function ProposalFeed() {
  const [proposals, setProposals] = React.useState(MOCK_PROPOSALS);
  const [showSummary, setShowSummary] = React.useState(true);
  return e('div', { style: { display: 'flex', flexDirection: 'column', height: '100%', background: 'var(--bg)' } },
    e('div', { className: 'feed-header' },
      e('div', { className: 'feed-header-left' },
        e('div', { className: 'scout-icon' }, '⚡'),
        e('div', null,
          e('div', { style: { fontSize: 14, fontWeight: 700, color: 'var(--text-1)' } }, 'SCOUT Proposals'),
          e('div', { className: 'mono', style: { fontSize: 10, color: 'var(--text-3)' } }, proposals.length + ' active · MiroFish verified')
        )
      ),
      e('button', { className: 'run-btn' }, '↻ Run SCOUT')
    ),
    showSummary && e('div', { className: 'run-summary mono' },
      e('div', { style: { display: 'flex', justifyContent: 'space-between' } },
        e('span', null, 'Last run: 6 analyzed · 4 proposed · 2 rejected · 3420ms'),
        e('button', { onClick: () => setShowSummary(false), style: { background: 'none', border: 'none', color: 'var(--text-4)', cursor: 'pointer' } }, '✕')
      ),
      e('div', { style: { marginTop: 6 } },
        e('div', { style: { color: 'var(--text-4)' } }, '✕ Duplicate price book audit — Similar open proposal already exists'),
        e('div', { style: { color: 'var(--text-4)' } }, '✕ Hire additional apprentice — Low confidence: 5.2/10')
      )
    ),
    e('div', { className: 'cards' },
      proposals.map(p => e(ProposalCard, {
        key: p.id, proposal: p,
        onConfirm: id => setProposals(prev => prev.filter(x => x.id !== id)),
        onSkip: id => setProposals(prev => prev.filter(x => x.id !== id)),
        onDetails: id => alert('Details for proposal: ' + id)
      }))
    )
  );
}

function Sidebar() {
  const navItems = [
    { id: 'nexus', label: 'NEXUS Chat', color: 'var(--green)', enabled: true },
    { id: 'dashboard', label: 'Dashboard', color: 'var(--blue)', enabled: true },
    { id: 'scout', label: 'Scout', color: 'var(--scout)', enabled: true, active: true },
  ];
  return e('aside', { className: 'sidebar' },
    e('div', { className: 'sidebar-logo' },
      e('div', { className: 'logo-icon' }, '⚡'),
      e('div', null,
        e('div', { style: { fontSize: 12, fontWeight: 700, color: 'var(--text-1)' } }, 'PowerOn Hub'),
        e('div', { className: 'mono', style: { fontSize: 10, color: 'var(--text-3)' } }, 'v2.0')
      )
    ),
    e('nav', { className: 'nav' },
      navItems.map(item => e('button', {
        key: item.id, className: 'nav-item' + (item.active ? ' active' : '')
      },
        e('span', { className: 'nav-dot', style: { background: item.color } }),
        e('span', null, item.label),
        item.active && e('span', { className: 'agent-label mono' }, 'SCOUT')
      ))
    )
  );
}

function App() {
  return e('div', { className: 'app' }, e(Sidebar), e('div', { className: 'main' }, e(ProposalFeed)));
}

function getTimeAgo(d) {
  const mins = Math.floor((Date.now() - new Date(d).getTime()) / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
